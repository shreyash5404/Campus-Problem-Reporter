<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | Campus Incident System</title>
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>

<div class="main-container">

    <div class="reset-card">

        <h2>Reset Password</h2>
        <p class="subtitle">Update your account password securely</p>

    <form action="/CAMPUS-PROBLEM-REPORTER/backend/reset_password.php" method="POST">
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" required>
        </div>

        <div class="form-group">
            <label>Current Password</label>
            <input type="password" name="current_password" required>
        </div>

        <div class="form-group">
            <label>New Password</label>
            <input type="password" name="new_password" required>
        </div>

        <div class="form-group">
            <label>Confirm New Password</label>
            <input type="password" name="confirm_password" required>
        </div>

        <button type="submit" class="reset-btn">Update Password</button>
    </form>

    </div>

</div>

<script src="forgot-password.js"></script>
</body>
</html>
