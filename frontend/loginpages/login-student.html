<!DOCTYPE html>
<html>
<head>
    <title>Student Login | Campus Incident System</title>
    <link rel="stylesheet" href="login-student.css">
</head>
<body>

<div class="main-container">

    <div class="login-card">

        <!-- Left Image Section -->
        <div class="image-section">
            <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Student Icon">
            <h2>Student Portal</h2>
            <p>Access your dashboard to report and track campus issues.</p>
        </div>

        <!-- Right Form Section -->
        <div class="form-section">

            <h3>Login to Continue</h3>

            <form action="/CAMPUS-PROBLEM-REPORTER/backend/login_student.php" method="POST" id="studentLoginForm">

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Enter your university email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </div>
                <div class="form-options">
                    <a href="http://localhost/CAMPUS-PROBLEM-REPORTER/frontend/loginpages/forgot-password.html">Forgot Password?</a>
                </div>

                <button type="submit" class="login-btn">Login</button>

            </form>

        </div>

    </div>

</div>

<script src="login-student.js"></script>
</body>
</html>
